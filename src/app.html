      .infra-field {
        position: absolute;
        inset: 0;
        pointer-events: none;
        perspective: 900px;
      }
      .infra-field::after {
        content: "";
        position: absolute;
        inset: auto 0 0;
        height: 42%;
        background: linear-gradient(180deg, transparent, rgb(5 7 12 / 0.96));
      }
      .infra-block {
        position: absolute;
        left: var(--x);
        top: var(--y);
        width: var(--w);
        height: var(--h);
        opacity: var(--o);
        border: 1px solid rgb(240 90 112 / 0.16);
        background: linear-gradient(145deg, rgb(72 26 42 / 0.62), rgb(16 11 18 / 0.78));
        box-shadow: 0 18px 42px rgb(0 0 0 / 0.42);
        transform: translate(-50%, -50%) rotateX(56deg) rotateZ(-38deg);
        animation: infraDrift 7s ease-in-out infinite;
        animation-delay: var(--d);
      }
      .infra-block::before,
      .infra-block::after {
        content: "";
        position: absolute;
        background: rgb(46 17 29 / 0.72);
        border: 1px solid rgb(240 90 112 / 0.1);
      }
      .infra-block::before {
        left: -1px;
        top: 100%;
        width: 100%;
        height: 26px;
        transform: skewX(-42deg);
        transform-origin: top;
      }
      .infra-block::after {
        left: 100%;
        top: -1px;
        width: 30px;
        height: 100%;
        transform: skewY(-48deg);
        transform-origin: left;
      }
      .infra-block.focus {
        border-color: rgb(240 90 112 / 0.76);
        background: linear-gradient(145deg, rgb(91 30 48 / 0.8), rgb(31 17 27 / 0.9));

        color: var(--ink);

        text-overflow: ellipsis;
        white-space: nowrap;
      }
      .fleet-box-meta {
        display: flex;
        flex-wrap: wrap;
        gap: 6px;
      }
      .fleet-box-meta span {
        border: 1px solid var(--line);
        border-radius: 6px;
        color: var(--muted);
        padding: 2px 7px;
        font-size: 12px;
      }
      .fleet-box code {
        min-width: 0;
        overflow: hidden;
        color: var(--ink);
        text-overflow: ellipsis;
        white-space: nowrap;

      .state-pill {

        text-align: center;
        font-size: 12px;
        font-weight: 700;

      .state-pill.expired,

        background: rgb(239 68 68 / 0.11);
        color: #f87171 !important;

      .state-pill.pending,
      .state-pill.pending_adapter,
      .state-pill.provisioning {
        border-color: rgb(251 191 36 / 0.25);

      .toolbar {
        display: grid;
        grid-template-columns: minmax(220px, 1fr) auto auto auto auto;
        gap: 12px;
        align-items: center;
        margin-bottom: 24px;
      }
      .search-wrap {
        position: relative;
        min-width: 0;
      }
      .ref-preview {

        left: 0;

        border-radius: 8px;
        background: var(--panel);
        box-shadow: var(--shadow-lg);

        display: none;

      .ref-preview-head {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 12px;
        padding: 10px 12px;
        border-bottom: 1px solid var(--line);
        color: var(--muted);
        font-size: 12px;
        font-weight: 700;
      }
      .ref-preview-list {
        display: grid;
        max-height: 360px;
        overflow: auto;
      }
      .ref-row {
        display: grid;
        grid-template-columns: minmax(0, 1fr) auto;
        gap: 10px;
        align-items: center;
        padding: 11px 12px;
        border-bottom: 1px solid var(--line);
      }
      .ref-row:last-child {
        border-bottom: 0;
      }
      .ref-title {
        min-width: 0;
        overflow: hidden;
        text-overflow: ellipsis;
        white-space: nowrap;
        font-size: 13px;
        font-weight: 700;
      }
      .ref-meta {
        display: flex;
        flex-wrap: wrap;
        gap: 6px;
        margin-top: 5px;
      }
      .ref-empty {
        padding: 16px 12px;
        color: var(--muted);
        font-size: 13px;
      }
      .toolbar .segmented {
        display: flex;
        border: 1px solid var(--line);
        border-radius: 8px;
        overflow: hidden;
        background: var(--panel);
        padding: 3px;
        gap: 3px;
        box-shadow: var(--shadow);
      }
      .segmented button {
        border: 0;
        border-radius: 6px;
        background: transparent;
        padding: 0 14px;
        font-weight: 500;
        box-shadow: none;
        transition: all 0.15s ease;
      }
      .segmented button:hover {
        background: var(--panel-2);
        box-shadow: none;
      }
      .segmented button.active {
        background: var(--ink);
        color: var(--panel);
        font-weight: 600;
        box-shadow: var(--shadow-md);
      }
      .segmented button.active:hover {
        background: var(--ink);
      }

      .board {
        display: grid;
        grid-template-columns: repeat(4, minmax(0, 1fr));
        gap: 16px;
        align-items: start;
      }
      .lane {

        border-radius: 10px;
        background: transparent;
        overflow: visible;
      }
      .lane-head {
        display: flex;
        align-items: center;
        justify-content: space-between;
        padding: 8px 12px 12px;
        background: transparent;
        font-weight: 600;
        font-size: 13px;
        text-transform: uppercase;
        letter-spacing: 0.05em;
        color: var(--muted);
      }
      .lane-head small {
        color: var(--faint);
        font-weight: 600;
        font-size: 12px;
      }
      .cards {
        display: grid;
        gap: 10px;
        padding: 0;
      }
      .card {
        border: 1px solid var(--line);
        border-radius: 10px;
        background: var(--panel);
        padding: 14px 16px;
        display: grid;
        gap: 12px;
        cursor: pointer;
        transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1);
        box-shadow: var(--shadow);
        position: relative;
        overflow: hidden;
      }
      .card::before {
        content: "";
        position: absolute;
        top: 0;
        left: 0;
        width: 3px;
        height: 100%;
        background: transparent;
        transition: background 0.2s ease;
      }
      .card:hover {
        border-color: var(--line-strong);
        box-shadow: var(--shadow-md);
        transform: translateY(-1px);
      }
      .card.running::before {
        background: var(--accent);
      }
      .card.review::before {
        background: var(--warning);
      }
      .card.done::before {
        background: var(--success);
      }
      .card h3 {
        margin: 0;
        font-size: 14px;
        line-height: 1.5;
        font-weight: 600;
        color: var(--ink);
        letter-spacing: -0.01em;
      }
      .meta {
        display: flex;
        flex-wrap: wrap;
        gap: 5px;
      }
      .chip {

        align-items: center;
        min-height: 22px;
        border-radius: 6px;
        padding: 4px 10px;
        background: var(--panel-2);

        font-size: 12px;
        font-weight: 500;
        letter-spacing: -0.01em;
        border: 1px solid var(--line);
      }
      .chip.hot {
        background: rgb(14 165 233 / 0.12);
        color: var(--accent);
        border-color: rgb(14 165 233 / 0.2);
        font-weight: 600;
      }
      .chip.merge {
        background: rgb(94 106 210 / 0.12);
        color: var(--primary);
        border-color: rgb(94 106 210 / 0.2);
      }
      .user-chip {
        justify-self: end;
        max-width: 190px;
      }
      .card p {
        margin: 0;
        color: var(--muted);
        font-size: 13px;
      }
      .change-card {
        border: 1px solid var(--line);
        border-radius: 6px;
        background: var(--panel-2);
        padding: 8px;
        display: grid;
        gap: 6px;
      }
      .change-card-head,
      .change-file {
        display: grid;
        grid-template-columns: auto minmax(0, 1fr) auto;
        gap: 7px;
        align-items: center;
      }
      .change-card-head {
        color: var(--muted);
        font-size: 11px;
        font-weight: 700;
      }
      .change-file {
        min-width: 0;
        font-family: ui-monospace, "SFMono-Regular", Menlo, Consolas, monospace;
        font-size: 11px;
      }
      .change-path {
        min-width: 0;
        overflow: hidden;
        text-overflow: ellipsis;
        white-space: nowrap;
      }
      .change-delta {

      }

      }
      .change-delta .del {

      }
      .status-badge {
        border-radius: 4px;

        background: var(--panel);
        color: var(--muted);
        font-size: 10px;
        font-weight: 800;
        text-transform: uppercase;
      }
      .status-badge.added {
        color: var(--success);

      .status-badge.deleted {
        color: #ef4444;
      }
      .status-badge.renamed {
        color: var(--warning);
      }
      .card-actions {
        display: grid;
        grid-template-columns: repeat(3, 1fr);
        gap: 6px;
      }
      .card-actions button {
        font-size: 12px;
        font-weight: 800;
        padding: 0 8px;
      }

      .drawer {
        position: fixed;
        inset: 0;
        z-index: 20;

        backdrop-filter: blur(6px);
        padding: 0;

      #sessions-drawer {
        z-index: 20;
      }
      #card-drawer,
      #interactive-drawer,
      #run-drawer,
      #admin-drawer {
        z-index: 30;
      }
      .drawer.open {
        display: grid;
        place-items: stretch end;
      }
      .panel {
        width: min(560px, 100%);
        height: 100%;
        border-left: 1px solid var(--line);
        background: var(--panel);
        box-shadow: var(--shadow-xl);
        display: grid;
        grid-template-rows: auto 1fr;
        overflow: hidden;
      }
      .panel.wide {
        width: min(820px, 100%);
      }
      .panel-head {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 12px;
        padding: 20px 24px;
        border-bottom: 1px solid var(--line);
        background: var(--panel);
      }
      .panel-head h2 {
        margin: 0;
        font-size: 20px;
        font-weight: 700;
        letter-spacing: -0.02em;
      }
      .panel-body {
        min-height: 0;
        overflow: auto;
        padding: 20px;
      }
      .form-grid {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 16px;
      }
      .full {
        grid-column: 1 / -1;
      }
      .form-note {
        grid-column: 1 / -1;
        border: 1px solid rgb(245 158 11 / 0.35);
        border-radius: 8px;
        background: rgb(245 158 11 / 0.08);
        color: var(--muted);
        padding: 10px 12px;
        font-size: 13px;
        line-height: 1.45;
      }
      .form-note a {
        color: var(--ink);
        font-weight: 700;
      }
      .actions {
        display: flex;
        gap: 10px;
        justify-content: flex-end;
        margin-top: 20px;
        padding-top: 20px;
        border-top: 1px solid var(--line);
      }

      .run-layout {
        display: grid;
        grid-template-columns: 1fr 220px;
        gap: 14px;
      }
      .run-main {
        min-width: 0;
        display: grid;
        gap: 12px;
      }
      .terminal {
        height: 410px;
        overflow: auto;
        border: 1px solid var(--line);
        border-radius: 6px;
        background: #1a1f2e;
        color: #e5e7eb;
        padding: 16px;
        font-family: ui-monospace, "SFMono-Regular", Menlo, Consolas, monospace;
        font-size: 13px;
        line-height: 1.6;
        white-space: pre-wrap;
      }
      .session-panel {
        width: 100%;
        height: 100dvh;
        border-left: 0;
      }
      .session-head {
        display: grid;
        grid-template-columns: 1fr auto;
        align-items: center;
        gap: 14px;
      }
      .session-head p {
        margin: 4px 0 0;
        color: var(--muted);
        font-size: 13px;
      }
      .session-tools {
        display: flex;
        align-items: center;
        gap: 8px;
        flex-wrap: wrap;
        justify-content: flex-end;
      }
      .session-tools select {
        width: auto;
        min-width: 82px;
        min-height: 34px;
        padding: 0 28px 0 10px;
        font-size: 12px;
        font-weight: 700;
      }
      .session-columns-field {
        display: inline-flex;
        align-items: center;
        gap: 6px;
        color: var(--muted);
        font-size: 12px;
        font-weight: 700;
      }
      .session-columns-field select {
        color: var(--ink);
      }
      .session-panel .panel-body {
        display: grid;
        align-items: stretch;
        min-height: 0;
        overflow: auto;
        overflow-anchor: none;
        overscroll-behavior: contain;
        scrollbar-gutter: stable;
        padding: 12px;
      }
      .session-grid {
        --session-gap: 12px;
        --session-tile-height: clamp(430px, calc((100dvh - 132px - var(--session-gap)) / 2), 560px);
        min-height: 0;
        display: grid;
        grid-template-columns: repeat(auto-fit, minmax(min(560px, 100%), 1fr));
        grid-auto-flow: row;
        grid-auto-rows: var(--session-tile-height);
        gap: var(--session-gap);
        align-items: stretch;
        overflow-anchor: none;
      }
      .session-grid.fixed-columns {
        grid-template-columns: repeat(var(--session-columns), minmax(0, 1fr));
      }
      .session-grid.layout-editing {
        user-select: none;
      }
      .session-grid.focus-mode {
        grid-template-columns: 1fr;
        grid-auto-rows: calc(100dvh - 120px);
      }
      .session-grid.single-session {
        grid-template-columns: 1fr;
        grid-auto-rows: minmax(0, calc(100dvh - 120px));
      }
      .session-cell {
        height: 100%;
        min-height: 0;
        min-width: 0;
        display: grid;
        grid-template-rows: auto minmax(0, 1fr) auto;
        border: 1px solid var(--line);
        border-radius: 8px;
        overflow: hidden;
        overflow-anchor: none;
        background: var(--panel-2);
        contain: layout paint;
        transition:
          border-color 0.12s ease,
          box-shadow 0.12s ease,
          opacity 0.12s ease;
      }
      .session-grid.focus-mode .session-cell {
        height: 100%;
      }
      .session-cell.dragging {
        opacity: 0.48;
      }
      .session-cell.drop-target {
        border-color: var(--primary);
        box-shadow: 0 0 0 2px rgb(124 138 219 / 0.24);
      }
      .session-cell-head {
        display: grid;
        grid-template-columns: minmax(0, 1fr) auto auto;
        grid-template-areas: "title status controls";
        column-gap: 10px;
        row-gap: 6px;
        align-items: center;
        min-height: 72px;
        padding: 10px 12px;
        border-bottom: 1px solid var(--line);
        background: var(--panel);
      }
      .session-cell-title {
        grid-area: title;
        min-width: 0;
        display: grid;
        gap: 3px;
      }
      .session-cell-title strong {
        overflow: hidden;
        text-overflow: ellipsis;
        white-space: nowrap;
        font-size: 14px;
      }
      .session-cell-title span {
        overflow: hidden;
        text-overflow: ellipsis;
        white-space: nowrap;
        color: var(--muted);
        font-size: 12px;
      }
      .session-status {
        grid-area: status;
        display: inline-flex;
        align-items: center;
        gap: 6px;
        max-width: 150px;
        border: 1px solid var(--line);
        border-radius: 999px;
        padding: 5px 9px;
        color: var(--ink);
        background: color-mix(in srgb, var(--panel-2) 76%, transparent);
        font-size: 12px;
        font-weight: 700;
        white-space: nowrap;
      }
      .session-status::before {
        content: "";
        width: 7px;
        height: 7px;
        border-radius: 999px;
        background: var(--muted);
      }
      .session-status.live::before {
        background: #38bdf8;
        box-shadow: 0 0 0 3px rgb(56 189 248 / 0.12);
      }
      .session-status.shared::before {
        background: #a78bfa;
      }
      .session-status.failed::before,
      .session-status.stopped::before {
        background: #f87171;
      }
      .session-status.provisioning::before {
        background: #f59e0b;
      }
      .session-controls {
        grid-area: controls;
        min-width: 0;
        max-width: 100%;
        display: flex;
        gap: 6px;
        flex-wrap: nowrap;
        justify-content: flex-end;
        pointer-events: auto;
      }
      .session-edit-controls {
        display: inline-flex;
      }
      .session-controls button {
        min-width: 34px;
        padding: 0 9px;
        font-size: 12px;
        font-weight: 700;
        white-space: nowrap;
      }
      .session-controls button:hover {
        transform: none;
      }
      .session-controls button.session-drag {
        cursor: grab;
      }
      .session-controls button.layout-control {
        min-width: 30px;
        padding: 0 7px;
      }
      .session-controls button.danger {
        color: #fca5a5;
      }
      .session-layout-menu {
        position: relative;
      }
      .session-layout-menu summary {
        min-height: 34px;
        display: inline-flex;
        align-items: center;
        border: 1px solid var(--line);
        border-radius: 8px;
        background: var(--panel);
        padding: 0 10px;
        color: var(--ink);
        font-size: 12px;
        font-weight: 700;
        box-shadow: var(--shadow);
        cursor: pointer;
        list-style: none;
      }
      .session-layout-menu summary::-webkit-details-marker {
        display: none;
      }
      .session-layout-popover {
        position: absolute;
        top: calc(100% + 6px);
        right: 0;
        z-index: 20;
        min-width: 160px;
        display: grid;
        gap: 6px;
        padding: 8px;
        border: 1px solid var(--line);
        border-radius: 8px;
        background: var(--panel);
        box-shadow: var(--shadow);
      }
      .session-layout-popover button {
        justify-content: flex-start;
      }
      .session-terminal-wrap {
        min-height: 0;
        background: #101827;
        position: relative;
        overflow: hidden;
      }
      .ghostty-terminal {
        width: 100%;
        height: 100%;
        min-height: 0;
        overflow: hidden;
        overflow-anchor: none;
        position: relative;
        caret-color: transparent;
        outline: none;
      }
      .terminal-surface {
        width: 100%;
        height: 100%;
        min-height: 0;
        overflow: hidden;
      }
      .terminal-surface[hidden] {
        display: none;
      }
      .terminal-surface canvas {
        display: block;
      }
      .terminal-placeholder {
        width: 100%;
        height: 100%;
        display: grid;
        place-items: center;
        color: var(--muted);
        background: #101827;
        font-family: ui-monospace, "SFMono-Regular", Menlo, Consolas, monospace;
        font-size: 12px;
      }
      .terminal-provisioning {
        width: 100%;
        height: 100%;
        display: grid;
        place-content: center;
        justify-items: center;
        gap: 9px;
        padding: 24px;
        color: #e5e7eb;
        background:
          linear-gradient(180deg, rgb(15 23 42 / 0.72), rgb(16 24 39 / 0.96)),
          repeating-linear-gradient(90deg, rgb(148 163 184 / 0.06) 0 1px, transparent 1px 42px);
        text-align: center;
        font-family: ui-monospace, "SFMono-Regular", Menlo, Consolas, monospace;
      }
      .terminal-provisioning strong {
        font-size: 13px;
      }
      .terminal-provisioning span,
      .terminal-provisioning small {
        color: #9ca3af;
      }
      .terminal-progress {
        width: 34px;
        height: 3px;
        overflow: hidden;
        border-radius: 999px;
        background: rgb(148 163 184 / 0.18);
      }
      .terminal-progress::before {
        content: "";
        display: block;
        width: 42%;
        height: 100%;
        border-radius: inherit;
        background: #f59e0b;
        animation: terminal-progress 1.2s ease-in-out infinite;
      }
      .terminal-provisioning.failed .terminal-progress::before {
        width: 100%;
        background: #f87171;
        animation: none;
      }
      @keyframes terminal-progress {
        0% {
          transform: translateX(-110%);
        }
        100% {
          transform: translateX(250%);
        }
      }
      .terminal-fallback {
        width: 100%;
        height: 100%;
        min-height: inherit;
        margin: 0;
        overflow: auto;
        padding: 14px;
        color: #e5e7eb;
        background: #101827;
        font-family: ui-monospace, "SFMono-Regular", Menlo, Consolas, monospace;
        font-size: 13px;
        line-height: 1.55;
        white-space: pre-wrap;
      }
      .session-cell-foot {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 10px;
        min-height: 34px;
        padding: 8px 12px;
        border-top: 1px solid var(--line);
        color: var(--muted);
        font-size: 12px;
        background: var(--panel);
      }
      .session-cell-foot span {
        min-width: 0;
        overflow: hidden;
        text-overflow: ellipsis;
        white-space: nowrap;
      }
      .session-empty {
        display: grid;
        place-items: center;
        align-content: center;
        gap: 12px;
        border: 1px dashed var(--line);
        border-radius: 8px;
        color: var(--muted);
        min-height: calc(100vh - 160px);
      }
      .session-empty-action {
        min-height: 48px;
        padding: 0 22px;
        font-size: 15px;
      }
      .diff-panel {
        border: 1px solid var(--line);
        border-radius: 6px;
        background: var(--panel);
        overflow: hidden;
      }
      .diff-panel[hidden] {
        display: none;
      }
      .diff-title {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 10px;
        padding: 10px 12px;
        border-bottom: 1px solid var(--line);
        font-size: 13px;
        font-weight: 700;
      }
      .diff-files {
        display: grid;
        gap: 6px;
        padding: 10px 12px;
        border-bottom: 1px solid var(--line);
      }
      .diff-code {
        max-height: 320px;
        overflow: auto;
        margin: 0;
        background: #101827;
        color: #d1d5db;
        font-family: ui-monospace, "SFMono-Regular", Menlo, Consolas, monospace;
        font-size: 12px;
        line-height: 1.55;
      }
      .diff-line {
        display: block;
        padding: 0 12px;
        white-space: pre;
      }
      .diff-line.add {
        background: rgb(16 185 129 / 0.14);
        color: #86efac;
      }
      .diff-line.del {
        background: rgb(239 68 68 / 0.14);
        color: #fca5a5;
      }
      .diff-line.hunk,
      .diff-line.file {
        background: rgb(94 106 210 / 0.16);
        color: #c7d2fe;
      }
      .sidebox {
        border: 1px solid var(--line);
        border-radius: 6px;
        background: var(--panel);
        padding: 14px;
        display: grid;
        gap: 12px;
        align-content: start;
      }
      .sidebox h3 {
        margin: 0;
        font-size: 14px;
        font-weight: 600;
      }
      .kv {
        display: grid;
        gap: 4px;
        color: var(--muted);
        font-size: 13px;
      }
      .kv strong {
        color: var(--ink);
      }

      .admin-grid {
        display: grid;
        grid-template-columns: repeat(3, minmax(0, 1fr));
        gap: 12px;
      }
      .admin-box {
        min-height: 260px;
        border: 1px solid var(--line);
        border-radius: 8px;
        background: var(--panel);
        padding: 16px;
        display: grid;
        gap: 12px;
        align-content: start;
      }
      .admin-box h3 {
        margin: 0;
        font-size: 16px;
        font-weight: 600;
      }
      .list {
        display: grid;
        gap: 6px;
      }
      .list-row {
        display: grid;
        grid-template-columns: 1fr auto;
        align-items: center;
        gap: 8px;
        min-height: 36px;
        border: 1px solid var(--line);
        border-radius: 6px;
        background: var(--panel-2);
        padding: 8px 10px;
        font-size: 13px;
        word-break: break-word;
        transition: all 0.15s ease;
      }
      .list-row:hover {
        border-color: var(--line-strong);
      }
      .empty {
        border: 1px dashed var(--line);
        border-radius: 6px;
        padding: 24px;
        color: var(--muted);
        text-align: center;
        font-size: 13px;
      }

      @keyframes infraDrift {
        0%,
        100% {
          transform: translate(-50%, -50%) rotateX(56deg) rotateZ(-38deg) translateY(0);
        }
        50% {
          transform: translate(-50%, -50%) rotateX(56deg) rotateZ(-38deg) translateY(-10px);
        }
      }

      @keyframes slideInRight {
        from {
          opacity: 0;
          transform: translateX(100%);
        }
        to {
          opacity: 1;
          transform: translateX(0);
        }
      }

      @keyframes fadeIn {
        from {
          opacity: 0;
        }
        to {
          opacity: 1;
        }
      }

      .drawer.open {
        animation: fadeIn 0.2s ease;
      }

      .drawer.open .panel {
        animation: slideInRight 0.3s cubic-bezier(0.4, 0, 0.2, 1);
      }

      @media (max-width: 1320px) {
        .top {
          grid-template-columns: 1fr;
        }
        .status-strip {
          min-width: 0;
        }
        .dashboard-grid {
          grid-template-columns: 1fr;
        }
        .board {
          grid-template-columns: repeat(2, minmax(248px, 1fr));
        }
        .admin-grid {
          grid-template-columns: 1fr;
        }
      }
      @media (max-width: 720px) {
        .app {
          grid-template-columns: 1fr;
        }
        .rail {
          position: static;
          height: auto;
          flex-direction: row;
          border-right: 0;
          border-bottom: 1px solid var(--line);
          padding: 12px 16px;
          flex-wrap: wrap;
        }
        .rail .spacer {
          display: none;
        }
        .brand-lockup {
          min-width: 0;
          margin-right: auto;
        }
        .shell {
          width: calc(100vw - 32px);
          padding: 18px 0 32px;
        }
        .login-screen {
          padding: 72px 18px 28px;
        }
        .login-back {
          left: 18px;
        }
        .setup-card,
        .vm-row {
          grid-template-columns: 1fr;
        }
        .command-row,
        .vm-badges,
        .fleet-box-actions {
          flex-direction: column;
          align-items: stretch;
        }
        .setup-card .terminal-command,
        .vm-badges button,
        .fleet-box-actions button {
          width: 100%;
        }
        .toolbar,
        .status-strip,
        .dev-identity-panel,
        .board,
        .run-layout,
        .form-grid,
        .session-head {
          grid-template-columns: 1fr;
        }
        .session-grid {
          grid-template-columns: 1fr;
          --session-tile-height: 430px;
        }
        .session-tools {
          justify-content: flex-start;
        }
        .session-cell {
          min-height: 0;
        }
        .session-cell-head {
          grid-template-columns: minmax(0, 1fr) auto;
          grid-template-areas:
            "title status"
            "controls controls";
        }
        .session-controls {
          justify-content: flex-start;
          flex-wrap: wrap;
        }
        .ref-preview {
          position: fixed;
          top: 116px;
          left: 16px;
          right: 16px;
          width: auto;
        }
        .lane {
          min-height: 0;
        }
        .drawer {
          padding: 8px;
        }
      }
    </style>
  </head>
  <body>
    <div id="crabfleet-preact-root"></div>
    <script type="module" src="/src/app/main.jsx"></script>
  </body>
</html>
