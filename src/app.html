<!doctype html>
<html lang="en" data-theme="dark">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />

    <meta
      name="description"
      content="OpenClaw Codex runs, repo-gated cards, attachable sessions, and merge policy in one operations board."
    />
    <meta property="og:title" content="Crabyard.ai" />
    <meta
      property="og:description"
      content="OpenClaw Codex runs, repo-gated cards, attachable sessions, and merge policy in one operations board."
    />
    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://crabyard.openclaw.ai/" />
    <meta property="og:image" content="https://crabyard.openclaw.ai/crabyard-logo.png" />
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="Crabyard.ai" />
    <meta
      name="twitter:description"
      content="OpenClaw Codex runs, repo-gated cards, attachable sessions, and merge policy in one operations board."
    />
    <meta name="twitter:image" content="https://crabyard.openclaw.ai/crabyard-logo.png" />
    <link rel="icon" type="image/png" href="/crabyard-logo.png" />
    <script>
      try {
        const theme = localStorage.getItem("crabyard-theme");
        if (theme === "light" || theme === "dark") document.documentElement.dataset.theme = theme;
      } catch {}
    </script>
    <script>
      __LUCIDE_ICONS__;
    </script>
    <style>
      :root {
        color-scheme: light;
        --ink: #0d0d0d;
        --muted: #6b7280;
        --faint: #9ca3af;
        --paper: #f7f8fa;
        --panel: #ffffff;
        --panel-2: #f9fafb;
        --line: #e5e7eb;
        --line-strong: #d1d5db;
        --primary: #5e6ad2;
        --primary-dark: #4c59c6;
        --accent: #0ea5e9;
        --success: #10b981;
        --warning: #f59e0b;
        --shadow: 0 1px 3px rgb(0 0 0 / 0.08), 0 1px 2px rgb(0 0 0 / 0.04);
        --shadow-md: 0 4px 6px -1px rgb(0 0 0 / 0.1), 0 2px 4px -1px rgb(0 0 0 / 0.06);
        --shadow-lg: 0 10px 15px -3px rgb(0 0 0 / 0.1), 0 4px 6px -2px rgb(0 0 0 / 0.05);
        --shadow-xl: 0 20px 25px -5px rgb(0 0 0 / 0.1), 0 10px 10px -5px rgb(0 0 0 / 0.04);
        font-family:
          ui-sans-serif,
          -apple-system,
          BlinkMacSystemFont,
          "Segoe UI",
          system-ui,
          sans-serif;
        font-size: 15px;
        line-height: 1.6;
        -webkit-font-smoothing: antialiased;
        -moz-osx-font-smoothing: grayscale;
      }

      :root[data-theme="dark"] {
        color-scheme: dark;
        --ink: #e5e9f0;
        --muted: #9ca3af;
        --faint: #6b7280;
        --paper: #0d1117;
        --panel: #161b22;
        --panel-2: #0d1117;
        --line: #30363d;
        --line-strong: #484f58;
        --primary: #7c8adb;
        --primary-dark: #6b7ad6;
        --accent: #38bdf8;
        --success: #34d399;
        --warning: #fbbf24;
        --shadow: 0 1px 3px rgb(0 0 0 / 0.3), 0 1px 2px rgb(0 0 0 / 0.2);
        --shadow-md: 0 4px 6px -1px rgb(0 0 0 / 0.4), 0 2px 4px -1px rgb(0 0 0 / 0.3);
        --shadow-lg: 0 10px 15px -3px rgb(0 0 0 / 0.5), 0 4px 6px -2px rgb(0 0 0 / 0.4);
        --shadow-xl: 0 20px 25px -5px rgb(0 0 0 / 0.6), 0 10px 10px -5px rgb(0 0 0 / 0.5);
      }

      * {
        box-sizing: border-box;
      }
      html,
      body {
        min-height: 100%;
      }
      body {
        margin: 0;
        color: var(--ink);
        background: var(--paper);
        line-height: 1.5;
        -webkit-font-smoothing: antialiased;
        -moz-osx-font-smoothing: grayscale;
      }

      button,
      input,
      select,
      textarea {
        font: inherit;
      }
      button {
        min-height: 34px;
        border: 1px solid var(--line);
        border-radius: 8px;
        background: var(--panel);
        color: var(--ink);
        cursor: pointer;
        font-weight: 500;
        transition: all 0.15s cubic-bezier(0.4, 0, 0.2, 1);
        padding: 0 14px;
        font-size: 14px;
        box-shadow: var(--shadow);
      }
      button:hover {
        background: var(--panel-2);
        border-color: var(--line-strong);
        transform: translateY(-1px);
        box-shadow: var(--shadow-md);
      }
      button:active {
        transform: translateY(0);
        box-shadow: var(--shadow);
      }
      button[disabled] {
        cursor: progress;
        opacity: 0.64;
        transform: none;
      }
      button.primary {
        border-color: var(--primary);
        background: var(--primary);
        color: #fff;
        font-weight: 600;
        box-shadow: 0 2px 6px rgb(94 106 210 / 0.25);
      }
      button.primary:hover {
        background: var(--primary-dark);
        border-color: var(--primary-dark);
        box-shadow: 0 4px 10px rgb(94 106 210 / 0.35);
      }
      button.ghost {
        border-color: transparent;
        background: transparent;
        box-shadow: none;
      }
      button.ghost:hover {
        background: var(--panel-2);
        box-shadow: none;
      }
      button.icon {
        width: 32px;
        padding: 0;
        font-weight: 600;
        display: inline-flex;
        align-items: center;
        justify-content: center;
      }
      button.icon svg,
      button svg {
        width: 16px;
        height: 16px;
        stroke-width: 2;
      }
      button.primary svg {
        color: #fff;
      }
      input,
      select,
      textarea {
        width: 100%;
        border: 1px solid var(--line);
        border-radius: 8px;
        background: var(--panel);
        color: var(--ink);
        padding: 9px 14px;
        outline: none;
        transition: all 0.15s cubic-bezier(0.4, 0, 0.2, 1);
        font-size: 14px;
        box-shadow: var(--shadow);
      }
      input:hover,
      select:hover,
      textarea:hover {
        border-color: var(--line-strong);
      }
      input:focus,
      select:focus,
      textarea:focus {
        border-color: var(--primary);
        box-shadow: 0 0 0 3px rgb(94 106 210 / 0.12);
      }
      textarea {
        min-height: 80px;
        resize: vertical;
      }
      label {
        display: grid;
        gap: 6px;
        color: var(--muted);
        font-size: 13px;
        font-weight: 600;
      }
      a {
        color: var(--primary);
        text-decoration: none;
        transition: color 0.15s ease;
      }
      a:hover {
        color: var(--primary-dark);
      }

      .app {
        min-height: 100vh;
        display: grid;
        grid-template-columns: 72px minmax(0, 1fr);
      }
      body.locked .app,
      body.locked .drawer {
        display: none;
      }
      .login-screen {
        min-height: 100vh;
        display: grid;
        place-items: center;
        padding: 24px;
        background:
          radial-gradient(ellipse at top, rgba(94, 106, 210, 0.15), transparent 50%), var(--paper);
      }
      .login-screen[hidden] {
        display: none;
      }
      .login-panel {
        width: min(480px, 100%);
        border: 1px solid var(--line);
        border-radius: 12px;
        background: var(--panel);
        box-shadow: var(--shadow-lg);
        padding: 40px 32px 32px;
        display: grid;
        gap: 20px;
      }
      .login-panel .mark {
        justify-self: center;
        width: 64px;
        height: 64px;
        margin-bottom: 8px;
      }
      .login-panel .mark img {
        width: 56px;
        height: 56px;
      }
      .login-panel h1 {
        margin: 0;
        font-size: 32px;
        line-height: 1.1;
        text-align: center;
        letter-spacing: -0.02em;
      }
      .login-panel p {
        margin: 0;
        color: var(--muted);
        text-align: center;
        line-height: 1.6;
      }
      .login-actions {
        display: grid;
        gap: 12px;
        margin-top: 8px;
      }
      .login-actions button.primary {
        min-height: 44px;
        font-size: 15px;
      }
      .login-footer {
        text-align: center;
        padding-top: 8px;
        border-top: 1px solid var(--line);
      }
      .login-footer a {
        font-size: 14px;
        font-weight: 500;
      }
      .banner {
        display: none;
        border: 1px solid var(--line);
        border-radius: 6px;
        padding: 10px 12px;
        background: var(--panel-2);
        color: var(--muted);
        font-size: 13px;
      }
      .banner.show {
        display: block;
      }
      .rail {
        position: sticky;
        top: 0;
        height: 100vh;
        padding: 16px 10px;
        border-right: 1px solid var(--line);
        background: var(--panel);
        display: flex;
        flex-direction: column;
        align-items: center;
        gap: 6px;
        box-shadow: var(--shadow);
      }
      .mark {
        width: 44px;
        height: 44px;
        border-radius: 12px;
        display: grid;
        place-items: center;
        margin-bottom: 12px;
        background: linear-gradient(145deg, #101827, #17243a);
        box-shadow: var(--shadow-md);
        overflow: hidden;
        transition: all 0.2s ease;
      }
      .mark:hover {
        transform: scale(1.05);
        box-shadow: var(--shadow-lg);
      }
      .mark img {
        width: 36px;
        height: 36px;
        object-fit: contain;
      }
      .rail button {
        width: 40px;
        height: 36px;
        padding: 0;
        font-size: 13px;
        font-weight: 600;
        border-radius: 8px;
        display: inline-flex;
        align-items: center;
        justify-content: center;
      }
      .rail button svg {
        width: 18px;
        height: 18px;
      }
      .rail button.active {
        background: var(--panel-2);
        color: var(--primary);
      }
      .rail button.active svg {
        color: var(--primary);
      }
      .rail button.theme-toggle {
        font-size: 12px;
        letter-spacing: 0;
      }
      .rail .spacer {
        flex: 1;
      }

      .shell {
        min-width: 0;
        padding: 32px 40px 48px;
      }
      .top {
        display: grid;
        grid-template-columns: minmax(260px, 1fr) auto;
        gap: 24px;
        align-items: start;
        margin-bottom: 28px;
      }
      .title h1 {
        margin: 0;
        font-size: clamp(28px, 4vw, 40px);
        line-height: 1.2;
        letter-spacing: -0.03em;
        font-weight: 700;
      }
      .title p {
        margin: 10px 0 0;
        color: var(--muted);
        max-width: 780px;
        line-height: 1.6;
        font-size: 15px;
      }
      .status-strip {
        display: grid;
        grid-template-columns: repeat(5, minmax(88px, 1fr));
        gap: 8px;
        min-width: 560px;
      }
      .metric {
        border: 1px solid var(--line);
        border-radius: 10px;
        background: var(--panel);
        padding: 14px 16px;
        box-shadow: var(--shadow);
        transition: all 0.2s ease;
      }
      .metric:hover {
        box-shadow: var(--shadow-md);
        border-color: var(--line-strong);
      }
      .metric span {
        display: block;
        color: var(--muted);
        font-size: 12px;
        font-weight: 600;
        text-transform: uppercase;
        letter-spacing: 0.05em;
      }
      .metric strong {
        display: block;
        margin-top: 6px;
        font-size: 28px;
        font-weight: 700;
        color: var(--ink);
        letter-spacing: -0.02em;
      }

      .toolbar {
        display: grid;
        grid-template-columns: minmax(220px, 1fr) auto auto auto auto auto;
        gap: 12px;
        align-items: center;
        margin-bottom: 24px;
      }
      .search-wrap {
        position: relative;
        min-width: 0;
      }
      .ref-preview {
        position: absolute;
        top: calc(100% + 6px);
        left: 0;
        z-index: 15;
        width: min(680px, calc(100vw - 128px));
        border: 1px solid var(--line);
        border-radius: 8px;
        background: var(--panel);
        box-shadow: var(--shadow-lg);
        overflow: hidden;
      }
      .ref-preview[hidden] {
        display: none;
      }
      .ref-preview-head {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 12px;
        padding: 10px 12px;
        border-bottom: 1px solid var(--line);
        color: var(--muted);
        font-size: 12px;
        font-weight: 700;
      }
      .ref-preview-list {
        display: grid;
        max-height: 360px;
        overflow: auto;
      }
      .ref-row {
        display: grid;
        grid-template-columns: minmax(0, 1fr) auto;
        gap: 10px;
        align-items: center;
        padding: 11px 12px;
        border-bottom: 1px solid var(--line);
      }
      .ref-row:last-child {
        border-bottom: 0;
      }
      .ref-title {
        min-width: 0;
        overflow: hidden;
        text-overflow: ellipsis;
        white-space: nowrap;
        font-size: 13px;
        font-weight: 700;
      }
      .ref-meta {
        display: flex;
        flex-wrap: wrap;
        gap: 6px;
        margin-top: 5px;
      }
      .ref-empty {
        padding: 16px 12px;
        color: var(--muted);
        font-size: 13px;
      }
      .toolbar .segmented {
        display: flex;
        border: 1px solid var(--line);
        border-radius: 8px;
        overflow: hidden;
        background: var(--panel);
        padding: 3px;
        gap: 3px;
        box-shadow: var(--shadow);
      }
      .segmented button {
        border: 0;
        border-radius: 6px;
        background: transparent;
        padding: 0 14px;
        font-weight: 500;
        box-shadow: none;
        transition: all 0.15s ease;
      }
      .segmented button:hover {
        background: var(--panel-2);
        box-shadow: none;
      }
      .segmented button.active {
        background: var(--ink);
        color: var(--panel);
        font-weight: 600;
        box-shadow: var(--shadow-md);
      }
      .segmented button.active:hover {
        background: var(--ink);
      }

      .board {
        display: grid;
        grid-template-columns: repeat(4, minmax(280px, 1fr));
        gap: 16px;
        align-items: start;
      }
      .lane {
        min-height: 560px;
        border-radius: 10px;
        background: transparent;
        overflow: visible;
      }
      .lane-head {
        display: flex;
        align-items: center;
        justify-content: space-between;
        padding: 8px 12px 12px;
        background: transparent;
        font-weight: 600;
        font-size: 13px;
        text-transform: uppercase;
        letter-spacing: 0.05em;
        color: var(--muted);
      }
      .lane-head small {
        color: var(--faint);
        font-weight: 600;
        font-size: 12px;
      }
      .cards {
        display: grid;
        gap: 10px;
        padding: 0;
      }
      .card {
        border: 1px solid var(--line);
        border-radius: 10px;
        background: var(--panel);
        padding: 14px 16px;
        display: grid;
        gap: 12px;
        cursor: pointer;
        transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1);
        box-shadow: var(--shadow);
        position: relative;
        overflow: hidden;
      }
      .card::before {
        content: "";
        position: absolute;
        top: 0;
        left: 0;
        width: 3px;
        height: 100%;
        background: transparent;
        transition: background 0.2s ease;
      }
      .card:hover {
        border-color: var(--line-strong);
        box-shadow: var(--shadow-md);
        transform: translateY(-1px);
      }
      .card.running::before {
        background: var(--accent);
      }
      .card.review::before {
        background: var(--warning);
      }
      .card.done::before {
        background: var(--success);
      }
      .card h3 {
        margin: 0;
        font-size: 14px;
        line-height: 1.5;
        font-weight: 600;
        color: var(--ink);
        letter-spacing: -0.01em;
      }
      .meta {
        display: flex;
        flex-wrap: wrap;
        gap: 5px;
      }
      .chip {
        display: inline-flex;
        align-items: center;
        min-height: 22px;
        border-radius: 6px;
        padding: 4px 10px;
        background: var(--panel-2);
        color: var(--muted);
        font-size: 12px;
        font-weight: 500;
        letter-spacing: -0.01em;
        border: 1px solid var(--line);
      }
      .chip.hot {
        background: rgb(14 165 233 / 0.12);
        color: var(--accent);
        border-color: rgb(14 165 233 / 0.2);
        font-weight: 600;
      }
      .chip.merge {
        background: rgb(94 106 210 / 0.12);
        color: var(--primary);
        border-color: rgb(94 106 210 / 0.2);
      }
      .user-chip {
        justify-self: end;
        max-width: 190px;
      }
      .card p {
        margin: 0;
        color: var(--muted);
        font-size: 13px;
      }
      .change-card {
        border: 1px solid var(--line);
        border-radius: 6px;
        background: var(--panel-2);
        padding: 8px;
        display: grid;
        gap: 6px;
      }
      .change-card-head,
      .change-file {
        display: grid;
        grid-template-columns: auto minmax(0, 1fr) auto;
        gap: 7px;
        align-items: center;
      }
      .change-card-head {
        color: var(--muted);
        font-size: 11px;
        font-weight: 700;
      }
      .change-file {
        min-width: 0;
        font-family: ui-monospace, "SFMono-Regular", Menlo, Consolas, monospace;
        font-size: 11px;
      }
      .change-path {
        min-width: 0;
        overflow: hidden;
        text-overflow: ellipsis;
        white-space: nowrap;
      }
      .change-delta {
        color: var(--muted);
        font-variant-numeric: tabular-nums;
      }
      .change-delta .add {
        color: var(--success);
      }
      .change-delta .del {
        color: #ef4444;
      }
      .status-badge {
        border-radius: 4px;
        padding: 2px 5px;
        background: var(--panel);
        color: var(--muted);
        font-size: 10px;
        font-weight: 800;
        text-transform: uppercase;
      }
      .status-badge.added {
        color: var(--success);
      }
      .status-badge.deleted {
        color: #ef4444;
      }
      .status-badge.renamed {
        color: var(--warning);
      }
      .card-actions {
        display: grid;
        grid-template-columns: repeat(3, 1fr);
        gap: 6px;
      }
      .card-actions button {
        font-size: 12px;
        font-weight: 800;
        padding: 0 8px;
      }

      .drawer {
        position: fixed;
        inset: 0;
        z-index: 20;
        display: none;
        background: rgb(0 0 0 / 0.5);
        backdrop-filter: blur(6px);
        padding: 0;
      }
      #sessions-drawer {
        z-index: 20;
      }
      #card-drawer,
      #interactive-drawer,
      #run-drawer,
      #admin-drawer {
        z-index: 30;
      }
      .drawer.open {
        display: grid;
        place-items: stretch end;
      }
      .panel {
        width: min(560px, 100%);
        height: 100%;
        border-left: 1px solid var(--line);
        background: var(--panel);
        box-shadow: var(--shadow-xl);
        display: grid;
        grid-template-rows: auto 1fr;
        overflow: hidden;
      }
      .panel.wide {
        width: min(820px, 100%);
      }
      .panel-head {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 12px;
        padding: 20px 24px;
        border-bottom: 1px solid var(--line);
        background: var(--panel);
      }
      .panel-head h2 {
        margin: 0;
        font-size: 20px;
        font-weight: 700;
        letter-spacing: -0.02em;
      }
      .panel-body {
        min-height: 0;
        overflow: auto;
        padding: 20px;
      }
      .form-grid {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 16px;
      }
      .full {
        grid-column: 1 / -1;
      }
      .form-note {
        grid-column: 1 / -1;
        border: 1px solid rgb(245 158 11 / 0.35);
        border-radius: 8px;
        background: rgb(245 158 11 / 0.08);
        color: var(--muted);
        padding: 10px 12px;
        font-size: 13px;
        line-height: 1.45;
      }
      .form-note a {
        color: var(--ink);
        font-weight: 700;
      }
      .actions {
        display: flex;
        gap: 10px;
        justify-content: flex-end;
        margin-top: 20px;
        padding-top: 20px;
        border-top: 1px solid var(--line);
      }

      .run-layout {
        display: grid;
        grid-template-columns: 1fr 220px;
        gap: 14px;
      }
      .run-main {
        min-width: 0;
        display: grid;
        gap: 12px;
      }
      .terminal {
        height: 410px;
        overflow: auto;
        border: 1px solid var(--line);
        border-radius: 6px;
        background: #1a1f2e;
        color: #e5e7eb;
        padding: 16px;
        font-family: ui-monospace, "SFMono-Regular", Menlo, Consolas, monospace;
        font-size: 13px;
        line-height: 1.6;
        white-space: pre-wrap;
      }
      .session-panel {
        width: 100%;
        height: 100dvh;
        border-left: 0;
      }
      .session-head {
        display: grid;
        grid-template-columns: 1fr auto;
        align-items: center;
        gap: 14px;
      }
      .session-head p {
        margin: 4px 0 0;
        color: var(--muted);
        font-size: 13px;
      }
      .session-tools {
        display: flex;
        align-items: center;
        gap: 8px;
        flex-wrap: wrap;
        justify-content: flex-end;
      }
      .session-tools select {
        width: auto;
        min-width: 82px;
        min-height: 34px;
        padding: 0 28px 0 10px;
        font-size: 12px;
        font-weight: 700;
      }
      .session-columns-field {
        display: inline-flex;
        align-items: center;
        gap: 6px;
        color: var(--muted);
        font-size: 12px;
        font-weight: 700;
      }
      .session-columns-field select {
        color: var(--ink);
      }
      .session-panel .panel-body {
        display: grid;
        align-items: stretch;
        min-height: 0;
        overflow: auto;
        overflow-anchor: none;
        overscroll-behavior: contain;
        scrollbar-gutter: stable;
        padding: 12px;
      }
      .session-grid {
        --session-gap: 12px;
        --session-tile-height: clamp(430px, calc((100dvh - 132px - var(--session-gap)) / 2), 560px);
        min-height: 0;
        display: grid;
        grid-template-columns: repeat(auto-fit, minmax(min(560px, 100%), 1fr));
        grid-auto-flow: row;
        grid-auto-rows: var(--session-tile-height);
        gap: var(--session-gap);
        align-items: stretch;
        overflow-anchor: none;
      }
      .session-grid.fixed-columns {
        grid-template-columns: repeat(var(--session-columns), minmax(0, 1fr));
      }
      .session-grid.layout-editing {
        user-select: none;
      }
      .session-grid.focus-mode {
        grid-template-columns: 1fr;
        grid-auto-rows: calc(100dvh - 120px);
      }
      .session-cell {
        height: 100%;
        min-height: 0;
        min-width: 0;
        display: grid;
        grid-template-rows: auto minmax(0, 1fr) auto;
        border: 1px solid var(--line);
        border-radius: 8px;
        overflow: hidden;
        overflow-anchor: none;
        background: var(--panel-2);
        contain: layout paint;
        transition:
          border-color 0.12s ease,
          box-shadow 0.12s ease,
          opacity 0.12s ease;
      }
      .session-grid.focus-mode .session-cell {
        height: 100%;
      }
      .session-cell.dragging {
        opacity: 0.48;
      }
      .session-cell.drop-target {
        border-color: var(--primary);
        box-shadow: 0 0 0 2px rgb(124 138 219 / 0.24);
      }
      .session-cell-head {
        display: grid;
        grid-template-columns: minmax(0, 1fr) auto auto;
        grid-template-areas: "title status controls";
        column-gap: 10px;
        row-gap: 6px;
        align-items: center;
        min-height: 72px;
        padding: 10px 12px;
        border-bottom: 1px solid var(--line);
        background: var(--panel);
      }
      .session-cell-title {
        grid-area: title;
        min-width: 0;
        display: grid;
        gap: 3px;
      }
      .session-cell-title strong {
        overflow: hidden;
        text-overflow: ellipsis;
        white-space: nowrap;
        font-size: 14px;
      }
      .session-cell-title span {
        overflow: hidden;
        text-overflow: ellipsis;
        white-space: nowrap;
        color: var(--muted);
        font-size: 12px;
      }
      .session-status {
        grid-area: status;
        display: inline-flex;
        align-items: center;
        gap: 6px;
        max-width: 150px;
        border: 1px solid var(--line);
        border-radius: 999px;
        padding: 5px 9px;
        color: var(--ink);
        background: color-mix(in srgb, var(--panel-2) 76%, transparent);
        font-size: 12px;
        font-weight: 700;
        white-space: nowrap;
      }
      .session-status::before {
        content: "";
        width: 7px;
        height: 7px;
        border-radius: 999px;
        background: var(--muted);
      }
      .session-status.live::before {
        background: #38bdf8;
        box-shadow: 0 0 0 3px rgb(56 189 248 / 0.12);
      }
      .session-status.shared::before {
        background: #a78bfa;
      }
      .session-status.failed::before,
      .session-status.stopped::before {
        background: #f87171;
      }
      .session-status.provisioning::before {
        background: #f59e0b;
      }
      .session-controls {
        grid-area: controls;
        min-width: 0;
        max-width: 100%;
        display: flex;
        gap: 6px;
        flex-wrap: nowrap;
        justify-content: flex-end;
        pointer-events: auto;
      }
      .session-edit-controls {
        display: inline-flex;
      }
      .session-controls button {
        min-width: 34px;
        padding: 0 9px;
        font-size: 12px;
        font-weight: 700;
        white-space: nowrap;
      }
      .session-controls button:hover {
        transform: none;
      }
      .session-controls button.session-drag {
        cursor: grab;
      }
      .session-controls button.layout-control {
        min-width: 30px;
        padding: 0 7px;
      }
      .session-controls button.danger {
        color: #fca5a5;
      }
      .session-layout-menu {
        position: relative;
      }
      .session-layout-menu summary {
        min-height: 34px;
        display: inline-flex;
        align-items: center;
        border: 1px solid var(--line);
        border-radius: 8px;
        background: var(--panel);
        padding: 0 10px;
        color: var(--ink);
        font-size: 12px;
        font-weight: 700;
        box-shadow: var(--shadow);
        cursor: pointer;
        list-style: none;
      }
      .session-layout-menu summary::-webkit-details-marker {
        display: none;
      }
      .session-layout-popover {
        position: absolute;
        top: calc(100% + 6px);
        right: 0;
        z-index: 20;
        min-width: 160px;
        display: grid;
        gap: 6px;
        padding: 8px;
        border: 1px solid var(--line);
        border-radius: 8px;
        background: var(--panel);
        box-shadow: var(--shadow);
      }
      .session-layout-popover button {
        justify-content: flex-start;
      }
      .session-terminal-wrap {
        min-height: 0;
        background: #101827;
        position: relative;
        overflow: hidden;
      }
      .ghostty-terminal {
        width: 100%;
        height: 100%;
        min-height: 0;
        overflow: hidden;
        overflow-anchor: none;
        position: relative;
        caret-color: transparent;
        outline: none;
      }
      .ghostty-terminal canvas {
        display: block;
      }
      .terminal-placeholder {
        width: 100%;
        height: 100%;
        display: grid;
        place-items: center;
        color: var(--muted);
        background: #101827;
        font-family: ui-monospace, "SFMono-Regular", Menlo, Consolas, monospace;
        font-size: 12px;
      }
      .terminal-provisioning {
        width: 100%;
        height: 100%;
        display: grid;
        place-content: center;
        gap: 8px;
        color: #e5e7eb;
        background: #101827;
        text-align: center;
        font-family: ui-monospace, "SFMono-Regular", Menlo, Consolas, monospace;
      }
      .terminal-provisioning span,
      .terminal-provisioning small {
        color: #9ca3af;
      }
      .terminal-fallback {
        width: 100%;
        height: 100%;
        min-height: inherit;
        margin: 0;
        overflow: auto;
        padding: 14px;
        color: #e5e7eb;
        background: #101827;
        font-family: ui-monospace, "SFMono-Regular", Menlo, Consolas, monospace;
        font-size: 13px;
        line-height: 1.55;
        white-space: pre-wrap;
      }
      .session-cell-foot {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 10px;
        min-height: 34px;
        padding: 8px 12px;
        border-top: 1px solid var(--line);
        color: var(--muted);
        font-size: 12px;
        background: var(--panel);
      }
      .session-cell-foot span {
        min-width: 0;
        overflow: hidden;
        text-overflow: ellipsis;
        white-space: nowrap;
      }
      .session-empty {
        display: grid;
        place-items: center;
        align-content: center;
        gap: 12px;
        border: 1px dashed var(--line);
        border-radius: 8px;
        color: var(--muted);
        min-height: calc(100vh - 160px);
      }
      .session-empty-action {
        min-height: 48px;
        padding: 0 22px;
        font-size: 15px;
      }
      .diff-panel {
        border: 1px solid var(--line);
        border-radius: 6px;
        background: var(--panel);
        overflow: hidden;
      }
      .diff-panel[hidden] {
        display: none;
      }
      .diff-title {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 10px;
        padding: 10px 12px;
        border-bottom: 1px solid var(--line);
        font-size: 13px;
        font-weight: 700;
      }
      .diff-files {
        display: grid;
        gap: 6px;
        padding: 10px 12px;
        border-bottom: 1px solid var(--line);
      }
      .diff-code {
        max-height: 320px;
        overflow: auto;
        margin: 0;
        background: #101827;
        color: #d1d5db;
        font-family: ui-monospace, "SFMono-Regular", Menlo, Consolas, monospace;
        font-size: 12px;
        line-height: 1.55;
      }
      .diff-line {
        display: block;
        padding: 0 12px;
        white-space: pre;
      }
      .diff-line.add {
        background: rgb(16 185 129 / 0.14);
        color: #86efac;
      }
      .diff-line.del {
        background: rgb(239 68 68 / 0.14);
        color: #fca5a5;
      }
      .diff-line.hunk,
      .diff-line.file {
        background: rgb(94 106 210 / 0.16);
        color: #c7d2fe;
      }
      .sidebox {
        border: 1px solid var(--line);
        border-radius: 6px;
        background: var(--panel);
        padding: 14px;
        display: grid;
        gap: 12px;
        align-content: start;
      }
      .sidebox h3 {
        margin: 0;
        font-size: 14px;
        font-weight: 600;
      }
      .kv {
        display: grid;
        gap: 4px;
        color: var(--muted);
        font-size: 13px;
      }
      .kv strong {
        color: var(--ink);
      }

      .admin-grid {
        display: grid;
        grid-template-columns: repeat(3, minmax(0, 1fr));
        gap: 12px;
      }
      .admin-box {
        min-height: 260px;
        border: 1px solid var(--line);
        border-radius: 8px;
        background: var(--panel);
        padding: 16px;
        display: grid;
        gap: 12px;
        align-content: start;
      }
      .admin-box h3 {
        margin: 0;
        font-size: 16px;
        font-weight: 600;
      }
      .list {
        display: grid;
        gap: 6px;
      }
      .list-row {
        display: grid;
        grid-template-columns: 1fr auto;
        align-items: center;
        gap: 8px;
        min-height: 36px;
        border: 1px solid var(--line);
        border-radius: 6px;
        background: var(--panel-2);
        padding: 8px 10px;
        font-size: 13px;
        word-break: break-word;
        transition: all 0.15s ease;
      }
      .list-row:hover {
        border-color: var(--line-strong);
      }
      .empty {
        border: 1px dashed var(--line);
        border-radius: 6px;
        padding: 24px;
        color: var(--muted);
        text-align: center;
        font-size: 13px;
      }

      @keyframes slideInRight {
        from {
          opacity: 0;
          transform: translateX(100%);
        }
        to {
          opacity: 1;
          transform: translateX(0);
        }
      }

      @keyframes fadeIn {
        from {
          opacity: 0;
        }
        to {
          opacity: 1;
        }
      }

      .drawer.open {
        animation: fadeIn 0.2s ease;
      }

      .drawer.open .panel {
        animation: slideInRight 0.3s cubic-bezier(0.4, 0, 0.2, 1);
      }

      @media (max-width: 1320px) {
        .top {
          grid-template-columns: 1fr;
        }
        .status-strip {
          min-width: 0;
        }
        .board {
          grid-template-columns: repeat(2, minmax(248px, 1fr));
        }
        .admin-grid {
          grid-template-columns: 1fr;
        }
      }
      @media (max-width: 720px) {
        .app {
          grid-template-columns: 1fr;
        }
        .rail {
          position: static;
          height: auto;
          flex-direction: row;
          border-right: 0;
          border-bottom: 1px solid var(--line);
        }
        .rail .spacer {
          display: none;
        }
        .shell {
          padding: 16px;
        }
        .toolbar,
        .status-strip,
        .board,
        .run-layout,
        .form-grid,
        .session-head {
          grid-template-columns: 1fr;
        }
        .session-grid {
          grid-template-columns: 1fr;
          --session-tile-height: 430px;
        }
        .session-tools {
          justify-content: flex-start;
        }
        .session-cell {
          min-height: 0;
        }
        .session-cell-head {
          grid-template-columns: minmax(0, 1fr) auto;
          grid-template-areas:
            "title status"
            "controls controls";
        }
        .session-controls {
          justify-content: flex-start;
          flex-wrap: wrap;
        }
        .ref-preview {
          position: fixed;
          top: 116px;
          left: 16px;
          right: 16px;
          width: auto;
        }
        .lane {
          min-height: 0;
        }
        .drawer {
          padding: 8px;
        }
      }
    </style>
  </head>
  <body>
    <div id="crabyard-preact-root"></div>
    <script type="module" src="/src/app/main.jsx"></script>
  </body>
</html>
