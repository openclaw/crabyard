name: cli

on:
  push:
    branches:
      - main
    paths:
      - "cmd/**"
      - "go.mod"
      - "go.sum"
      - "Dockerfile.ssh-gateway"
      - ".github/workflows/cli.yml"
  pull_request:
    paths:
      - "cmd/**"
      - "go.mod"
      - "go.sum"
      - "Dockerfile.ssh-gateway"
      - ".github/workflows/cli.yml"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: cli-${{ github.ref }}
  cancel-in-progress: true

jobs:
  go:
    name: Go CLI
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Check out
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Set up Go
        uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
        with:
          go-version-file: go.mod
          cache: true

      - name: Download modules
        run: go mod download

      - name: Test
        run: go test ./...

      - name: Vet
        run: go vet ./...

      - name: Build crabfleet
        run: go build -trimpath -o /tmp/crabfleet ./cmd/crabfleet

      - name: Build SSH gateway
        run: go build -trimpath -o /tmp/crabbox-ssh-gateway ./cmd/crabbox-ssh-gateway

      - name: Smoke CLI help
        run: |
          /tmp/crabfleet --version
          /tmp/crabfleet --help
          /tmp/crabfleet new --help
          /tmp/crabfleet login

      - name: Build SSH gateway image
        run: docker build -f Dockerfile.ssh-gateway .
