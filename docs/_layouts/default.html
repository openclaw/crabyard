<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>{{ page.title }} | {{ site.title }}</title>
    <meta name="description" content="{{ page.description | default: site.description }}" />
    <meta property="og:title" content="{{ page.title }} | {{ site.title }}" />
    <meta property="og:description" content="{{ page.description | default: site.description }}" />
    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://crabyard.ai{{ page.url }}" />
    <meta property="og:image" content="https://crabyard.ai/crabyard-logo.png" />
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="{{ page.title }} | {{ site.title }}" />
    <meta name="twitter:description" content="{{ page.description | default: site.description }}" />
    <meta name="twitter:image" content="https://crabyard.ai/crabyard-logo.png" />
    <link rel="icon" type="image/png" href="/crabyard-logo.png" />
    <style>
      :root {
        color-scheme: light dark;
        --bg: #0f1217;
        --panel: #171b25;
        --text: #f4f6fb;
        --muted: #a9b0c0;
        --line: #2b3140;
        --accent: #8ea2ff;
        font-family:
          Inter,
          ui-sans-serif,
          system-ui,
          -apple-system,
          BlinkMacSystemFont,
          "Segoe UI",
          sans-serif;
      }
      * {
        box-sizing: border-box;
      }
      body {
        margin: 0;
        background: var(--bg);
        color: var(--text);
        line-height: 1.6;
      }
      header {
        border-bottom: 1px solid var(--line);
        background: color-mix(in srgb, var(--bg) 92%, transparent);
        position: sticky;
        top: 0;
      }
      .bar,
      main {
        max-width: 1100px;
        margin: 0 auto;
        padding: 0 24px;
      }
      .bar {
        min-height: 58px;
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 16px;
      }
      .brand {
        color: var(--text);
        font-weight: 800;
        text-decoration: none;
      }
      nav {
        display: flex;
        flex-wrap: wrap;
        gap: 12px;
        font-size: 14px;
      }
      a {
        color: var(--accent);
        text-decoration: none;
      }
      a:hover {
        text-decoration: underline;
      }
      main {
        padding-top: 36px;
        padding-bottom: 72px;
      }
      article {
        max-width: 850px;
      }
      h1,
      h2,
      h3 {
        line-height: 1.2;
        letter-spacing: 0;
      }
      h1 {
        font-size: 40px;
        margin: 0 0 18px;
      }
      h2 {
        margin-top: 42px;
        padding-top: 10px;
        border-top: 1px solid var(--line);
      }
      code,
      pre {
        font-family: "SFMono-Regular", Consolas, ui-monospace, monospace;
      }
      code {
        background: var(--panel);
        border: 1px solid var(--line);
        border-radius: 5px;
        padding: 0.08rem 0.28rem;
      }
      pre {
        overflow: auto;
        padding: 16px;
        border: 1px solid var(--line);
        border-radius: 8px;
        background: var(--panel);
      }
      pre code {
        border: 0;
        padding: 0;
      }
      table {
        border-collapse: collapse;
        width: 100%;
        display: block;
        overflow-x: auto;
      }
      th,
      td {
        border: 1px solid var(--line);
        padding: 8px 10px;
      }
      blockquote {
        border-left: 3px solid var(--accent);
        margin-left: 0;
        padding-left: 16px;
        color: var(--muted);
      }
      @media (max-width: 720px) {
        .bar {
          align-items: flex-start;
          flex-direction: column;
          padding-top: 14px;
          padding-bottom: 14px;
        }
        h1 {
          font-size: 32px;
        }
      }
    </style>
  </head>
  <body>
    <header>
      <div class="bar">
        <a class="brand" href="{{ '/' | relative_url }}">Crabyard.ai</a>
        <nav aria-label="Docs">
          <a href="{{ '/quickstart/' | relative_url }}">Quickstart</a>
          <a href="{{ '/architecture/' | relative_url }}">Architecture</a>
          <a href="{{ '/cards/' | relative_url }}">Cards</a>
          <a href="{{ '/runs/' | relative_url }}">Runs</a>
          <a href="{{ '/admin/' | relative_url }}">Admin</a>
          <a href="{{ '/api/' | relative_url }}">API</a>
          <a href="{{ '/spec/' | relative_url }}">Spec</a>
          <a href="https://crabyard.ai/app/">App</a>
        </nav>
      </div>
    </header>
    <main>
      <article>{{ content }}</article>
    </main>
  </body>
</html>
