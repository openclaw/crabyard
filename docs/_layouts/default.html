<!doctype html>
<html lang="en" data-theme="dark">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>{{ page.title }} | {{ site.title }}</title>
    <meta name="description" content="{{ page.description | default: site.description }}" />
    <meta property="og:title" content="{{ page.title }} | {{ site.title }}" />
    <meta property="og:description" content="{{ page.description | default: site.description }}" />
    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://docs.crabfleet.ai{{ page.url }}" />
    <meta property="og:image" content="https://clawfleet.openclaw.ai/crabfleet-og.png" />
    <meta property="og:image:width" content="1200" />
    <meta property="og:image:height" content="630" />
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="{{ page.title }} | {{ site.title }}" />
    <meta name="twitter:description" content="{{ page.description | default: site.description }}" />
    <meta name="twitter:image" content="https://clawfleet.openclaw.ai/crabfleet-og.png" />
    <link rel="icon" type="image/png" href="/crabbox-logo.png" />
    <style>
      :root {
        color-scheme: dark;
        --ink: #f2f2f5;
        --text: #c9c5cf;
        --muted: #918d98;
        --faint: #5f5a66;
        --paper: #070a10;
        --panel: #100b0d;
        --panel-2: #151016;
        --line: #2a2630;
        --primary: #f05a70;
        --blue: #3b82f6;
        --green: #34d399;
        --amber: #fbbf24;
        font-family:
          Inter,
          ui-sans-serif,
          system-ui,
          -apple-system,
          BlinkMacSystemFont,
          "Segoe UI",
          sans-serif;
      }
      * {
        box-sizing: border-box;
      }
      body {
        margin: 0;
        background:
          radial-gradient(circle at 48% -8%, rgb(240 90 112 / 0.12), transparent 34rem),
          radial-gradient(circle at 86% 12%, rgb(59 130 246 / 0.1), transparent 30rem), var(--paper);
        color: var(--text);
        line-height: 1.65;
      }
      a {
        color: var(--primary);
        text-decoration: none;
      }
      a:hover {
        text-decoration: underline;
        text-underline-offset: 0.2em;
      }
      .shell {
        display: grid;
        grid-template-columns: 268px minmax(0, 1fr);
        min-height: 100vh;
      }
      aside {
        position: sticky;
        top: 0;
        height: 100vh;
        overflow: auto;
        padding: 24px 22px;
        border-right: 1px solid var(--line);
        background: rgb(16 11 13 / 0.86);
        backdrop-filter: blur(18px);
      }
      .brand {
        display: flex;
        align-items: center;
        gap: 11px;
        color: var(--ink);
        font-weight: 700;
        text-decoration: none;
        margin-bottom: 24px;
      }
      .mark {
        width: 28px;
        height: 28px;
        border-radius: 8px;
      }
      nav h2 {
        margin: 18px 0 6px;
        color: var(--muted);
        font-size: 0.68rem;
        font-weight: 700;
        letter-spacing: 0;
        text-transform: uppercase;
      }
      nav a {
        display: block;
        padding: 5px 10px;
        border-radius: 6px;
        color: var(--text);
        font-size: 0.9rem;
      }
      nav a:hover {
        background: var(--panel-2);
        color: var(--ink);
        text-decoration: none;
      }
      main {
        min-width: 0;
        width: min(920px, 100%);
        padding: 48px clamp(20px, 5vw, 64px) 80px;
      }
      article {
        max-width: 76ch;
        min-width: 0;
        overflow-wrap: break-word;
      }
      h1,
      h2,
      h3 {
        color: var(--ink);
        line-height: 1.18;
        letter-spacing: 0;
      }
      h1 {
        margin: 0 0 0.5em;
        font-size: 2.6rem;
      }
      h2 {
        margin: 2em 0 0.55em;
        font-size: 1.45rem;
      }
      h3 {
        margin: 1.7em 0 0.35em;
        font-size: 1.1rem;
      }
      p,
      ul,
      ol,
      pre {
        margin: 0 0 1.05em;
      }
      ul,
      ol {
        padding-left: 1.3rem;
      }
      code,
      pre {
        font-family: "SFMono-Regular", Consolas, ui-monospace, monospace;
      }
      code {
        border: 1px solid var(--line);
        border-radius: 5px;
        background: #18131a;
        color: var(--ink);
        padding: 0.08rem 0.32rem;
      }
      pre {
        overflow: auto;
        border: 1px solid #1c2030;
        border-radius: 8px;
        background: #06080d;
        color: #e6edf3;
        padding: 14px 18px;
      }
      pre code {
        border: 0;
        background: transparent;
        padding: 0;
      }
      table {
        display: block;
        width: 100%;
        overflow-x: auto;
        border-collapse: collapse;
      }
      th,
      td {
        border-bottom: 1px solid var(--line);
        padding: 9px 10px;
        text-align: left;
      }
      blockquote {
        margin-left: 0;
        border-left: 3px solid var(--primary);
        padding-left: 16px;
        color: var(--muted);
      }
      @media (max-width: 900px) {
        .shell {
          display: block;
        }
        aside {
          position: static;
          height: auto;
        }
        main {
          padding: 36px 18px 56px;
        }
        h1 {
          font-size: 2.1rem;
        }
      }
    </style>
  </head>
  <body>
    <div class="shell">
      <aside>
        <a class="brand" href="{{ '/' | relative_url }}">
          <img class="mark" src="/crabbox-logo.png" alt="" width="28" height="28" />
          <span>Crabfleet</span>
        </a>
        <nav aria-label="Docs">
          <h2>Start</h2>
          <a href="{{ '/' | relative_url }}">Overview</a>
          <a href="{{ '/quickstart/' | relative_url }}">Quickstart</a>
          <a href="{{ '/architecture/' | relative_url }}">Architecture</a>
          <h2>Features</h2>
          <a href="{{ '/cards/' | relative_url }}">Cards</a>
          <a href="{{ '/runs/' | relative_url }}">Runs</a>
          <a href="{{ '/admin/' | relative_url }}">Admin</a>
          <h2>Reference</h2>
          <a href="{{ '/api/' | relative_url }}">API</a>
          <a href="{{ '/spec/' | relative_url }}">Spec</a>
          <a href="https://clawfleet.openclaw.ai/app/">App</a>
        </nav>
      </aside>
      <main>
        <article>{{ content }}</article>
      </main>
    </div>
  </body>
</html>
